<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>VAI Futuristic Dashboard</title>

<script src="https://cdn.plot.ly/plotly-2.26.1.min.js"></script>

<style>
:root{
  --bg:#050816;
  --card:rgba(15,20,40,0.65);
  --border:rgba(0,153,255,0.35);
  --glow:0 0 15px rgba(0,153,255,0.4);
  --text:#e6f1ff;
  --muted:#8fa6c9;
}

/* Background */
body{
  margin:0;
  font-family:Inter, sans-serif;
  color:var(--text);
  background: radial-gradient(circle at 20% 20%, #071a3a, #02050f 60%);
  overflow-x:hidden;
}

/* Animated RGB glow */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background: linear-gradient(45deg,#00f0ff,#0066ff,#7a00ff,#00f0ff);
  opacity:0.08;
  animation: move 15s linear infinite;
}
@keyframes move{
  0%{transform:translate(-25%,-25%)}
  100%{transform:translate(25%,25%)}
}

.app{
  max-width:1300px;
  margin:30px auto;
  padding:20px;
}

/* Header */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px;
  border-radius:16px;
  background:var(--card);
  border:1px solid var(--border);
  box-shadow:var(--glow);
  backdrop-filter: blur(12px);
}

.title{
  font-size:22px;
  font-weight:700;
  letter-spacing:0.5px;
}

.subtitle{
  font-size:13px;
  color:var(--muted);
}

/* Grid */
.grid{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(12,1fr);
  gap:18px;
}

/* Cards */
.card{
  grid-column:span 6;
  border-radius:16px;
  padding:14px;
  background:var(--card);
  border:1px solid var(--border);
  box-shadow:var(--glow);
  transition:0.3s ease;
  backdrop-filter: blur(10px);
  position:relative;
}

.card:hover{
  transform:translateY(-6px) scale(1.01);
  box-shadow:0 0 25px rgba(0,153,255,0.6);
}

.card.full{
  grid-column:span 12;
}

.card h3{
  margin:6px 0;
}

.meta{
  color:var(--muted);
  font-size:12px;
}

/* Responsive */
@media(max-width:1000px){
  .card{grid-column:span 12}
}

/* Footer */
footer{
  margin-top:20px;
  text-align:center;
  font-size:12px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="app">

<header class="header">
  <div>
    <div class="title">⚡ VAI Futuristic Dashboard</div>
    <div class="subtitle">AI Analytics • Real-time Insight</div>
  </div>
</header>

<section class="grid">

<div class="card">
<div class="meta">Top FAQ Candidates</div>
<h3>Top FAQs</h3>
<div id="faqChart"></div>
</div>

<div class="card">
<div class="meta">Messages Distribution</div>
<h3>Messages per Session</h3>
<div id="histChart"></div>
</div>

<div class="card full">
<div class="meta">Daily Sessions</div>
<h3>Traffic Trend</h3>
<div id="lineChart" style="height:350px"></div>
</div>

<div class="card">
<div class="meta">User Satisfaction</div>
<h3>Satisfaction</h3>
<div id="pieChart"></div>
</div>

<div class="card">
<div class="meta">Website Traffic</div>
<h3>Monthly Users</h3>
<div id="trafficChart"></div>
</div>

</section>

<footer>© 2026 CogniAI Studios</footer>

</div>

<script>

/* KEEP YOUR DATA EXACTLY SAME */
const sampleData = window.sampleData || {};

/* COMMON LAYOUT */
function baseLayout(){
  return {
    paper_bgcolor:'rgba(0,0,0,0)',
    plot_bgcolor:'rgba(0,0,0,0)',
    font:{color:'#e6f1ff'},
  }
}

/* FAQ */
function renderFAQ(data){
  Plotly.react('faqChart',[{
    x:data.map(d=>d.count),
    y:data.map(d=>d.label),
    type:'bar',
    orientation:'h',
    marker:{
      color:'#00c3ff',
      line:{color:'#00f0ff',width:1}
    }
  }],{
    ...baseLayout(),
    margin:{l:200},
  })
}

/* HIST */
function renderHist(hist){
  Plotly.react('histChart',[{
    x:hist.bins,
    y:hist.counts,
    type:'bar',
    marker:{color:'#007bff'}
  }],baseLayout())
}

/* LINE */
function renderLine(daily){
  Plotly.react('lineChart',[{
    x:daily.map(d=>d.date),
    y:daily.map(d=>d.count),
    mode:'lines+markers',
    line:{
      color:'#00f0ff',
      width:3,
      shape:'spline'
    },
    marker:{size:6}
  }],{
    ...baseLayout(),
    xaxis:{gridcolor:'rgba(255,255,255,0.05)'},
    yaxis:{gridcolor:'rgba(255,255,255,0.05)'}
  })
}

/* PIE */
function renderPie(sat){
  Plotly.react('pieChart',[{
    labels:['Positive','Neutral','Negative'],
    values:[sat.positive,sat.neutral,sat.negative],
    type:'pie',
    marker:{
      colors:['#00ffcc','#ffaa00','#ff3b6b']
    }
  }],baseLayout())
}

/* TRAFFIC */
function renderTraffic(m){
  Plotly.react('trafficChart',[{
    x:m.months,
    y:m.users,
    type:'scatter',
    mode:'lines+markers',
    line:{color:'#00f0ff',width:3}
  }],baseLayout())
}

/* UPDATE */
function updateDashboard(data){
  renderFAQ(data.top_faq)
  renderHist(data.msg_hist)
  renderLine(data.daily)
  renderPie(data.satisfaction)
  renderTraffic(data.monthlyTraffic || {
    months:['Nov','Dec','Jan','Feb'],
    users:[30,20,10,15]
  })
}

updateDashboard(sampleData)

</script>

</body>
</html>
